services:
  mysql:
    image: mysql:8.0
    container_name: doctalk-mysql
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-doctalkroot}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-doctalk}
      MYSQL_USER: ${MYSQL_USER:-doctalk}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-doctalk}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${MYSQL_USER:-doctalk}", "-p${MYSQL_PASSWORD:-doctalk}"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 15s

  adminer:
    image: adminer:latest
    container_name: doctalk-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
